name: develop CI with Gradle and Docker (Multi-Module)
#push	코드가 반영될 때 즉시 실행	CI/CD의 기본
#pull_request	코드 리뷰 단계에서 검증	코드 품질 관리 핵심
#workflow_dispatch	필요할 때 수동으로 실행	디버깅 및 수동 배포용
#schedule	정해진 시간에 자동 실행	정기 점검 및 배치 작업
#workflow_run	다른 액션이 끝난 뒤 실행	파이프라인 연계용
on:
  pull_request:
    branches: ["develop"]
    types: [opened, synchronize] # pr이 업데이트 될때 실행

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 #코드 가져오기
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto' #자바 배포판 이름
      - name: Run Tests
        run: ./gradlew test -Dspring.profiles.active=develop

  build:
    needs: test #test가 성공해야 시작
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - name: Build with Gradle
        run: ./gradlew :web:build -x test -Dspring.profiles.active=develop

      - name: Set SHA
        id: set_sha
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-jar
          path: web/build/libs/*.jar

  deploy:
    needs: build #build가 성공해야 시작
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'develop' # 푸시할 브랜치 이름을 명시해줍니다.

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-jar
          path: web/build/libs/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-store-service-dev:${{ needs.build.outputs.image_tag }}
            ${{ secrets.DOCKER_USERNAME }}/my-store-service-dev:latest

      - name: Update Kubernetes YAML
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/my-store-service-dev:.*|image: ${{ secrets.DOCKER_USERNAME }}/my-store-service-dev:${{ needs.build.outputs.image_tag }}|g" ./k8s/deployment-dev.yaml
          
          #sed -i "s|image: 유저명/이미지명:.*|image: 유저명/이미지명:새태그|g" 파일경로 -> 파일 수정 , 파일 내부에 image 찾아서 변경
          
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add ./k8s/deployment-dev.yaml
          git commit -m "chore: update dev image tag [skip ci]"
          git push